{% extends 'recipes/base.html' %}
{% block content %}
<div class="card" style="max-width:500px;margin:2rem auto;text-align:center">
    <h2 style="margin-bottom:1rem">Delete Recipe</h2>
    <p style="color:#666;margin-bottom:1.5rem">Are you sure you want to delete <strong>{{ recipe.title }}</strong>? This cannot be undone.</p>
    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'recipe_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
